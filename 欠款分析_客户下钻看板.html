<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>欠款分析 · 客户下钻看板</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;
  background:#0f1923;
  color:#e0e0e0;
  min-height:100vh;
}
/* ===== 顶部 ===== */
.topbar{
  background:linear-gradient(90deg,#1a2740,#1e3050);
  border-bottom:1px solid rgba(255,255,255,.08);
  padding:18px 32px;
  display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:100;
}
.topbar-title{font-size:18px;font-weight:700;color:#fff;display:flex;align-items:center;gap:10px;}
.topbar-title span{font-size:22px;}
.topbar-sub{font-size:13px;color:#78909c;margin-top:3px;}
.update-time{font-size:12px;color:#546e7a;}

/* ===== 总览卡片 ===== */
.summary-bar{
  display:grid;
  grid-template-columns:repeat(5,1fr);
  gap:16px;
  padding:24px 32px;
}
.sum-card{
  background:rgba(255,255,255,.05);
  border:1px solid rgba(255,255,255,.08);
  border-radius:12px;
  padding:18px 20px;
  text-align:center;
}
.sum-card.total{ border-color:rgba(239,83,80,.35); background:rgba(239,83,80,.08);}
.sum-val{font-size:26px;font-weight:700;margin-bottom:4px;}
.sum-card.total .sum-val{color:#ef5350;}
.sum-card:nth-child(2) .sum-val{color:#26c6da;}
.sum-card:nth-child(3) .sum-val{color:#ffa726;}
.sum-card:nth-child(4) .sum-val{color:#ef5350;}
.sum-card:nth-child(5) .sum-val{color:#b71c1c;}
.sum-label{font-size:12px;color:#78909c;}
.sum-pct{font-size:11px;color:#546e7a;margin-top:3px;}

/* ===== 主内容 ===== */
.main{padding:0 32px 40px;}

/* 面包屑 */
.breadcrumb{
  display:flex;align-items:center;gap:8px;
  padding:14px 0;
  font-size:13px;color:#78909c;
  border-bottom:1px solid rgba(255,255,255,.05);
  margin-bottom:20px;
  cursor:default;
}
.breadcrumb .bc-link{color:#4fc3f7;cursor:pointer;}
.breadcrumb .bc-link:hover{text-decoration:underline;}
.breadcrumb .bc-sep{color:#37474f;}

/* 工具栏 */
.toolbar{
  display:flex;align-items:center;gap:12px;margin-bottom:16px;flex-wrap:wrap;
}
.toolbar-title{font-size:15px;font-weight:600;color:#cfd8dc;flex:1;}
.search-box{
  padding:8px 14px;border-radius:8px;border:1px solid rgba(255,255,255,.12);
  background:rgba(255,255,255,.06);color:#e0e0e0;font-size:13px;width:220px;
  outline:none;
}
.search-box:focus{border-color:#4fc3f7;}
.search-box::placeholder{color:#546e7a;}
.filter-btn{
  padding:7px 14px;border-radius:8px;border:1px solid rgba(255,255,255,.12);
  background:rgba(255,255,255,.06);color:#b0bec5;font-size:12px;cursor:pointer;
  transition:all .2s;
}
.filter-btn:hover,.filter-btn.active{
  background:rgba(79,195,247,.15);border-color:#4fc3f7;color:#4fc3f7;
}

/* ===== 表格 ===== */
.table-wrap{overflow-x:auto;border-radius:12px;border:1px solid rgba(255,255,255,.07);}
table{width:100%;border-collapse:collapse;font-size:13px;}
thead tr{background:rgba(255,255,255,.06);}
th{
  padding:12px 14px;text-align:left;color:#90a4ae;font-weight:600;
  font-size:12px;white-space:nowrap;border-bottom:1px solid rgba(255,255,255,.06);
}
th.right,td.right{text-align:right;}
th.center,td.center{text-align:center;}
tbody tr{
  border-bottom:1px solid rgba(255,255,255,.04);
  transition:background .15s;
  cursor:pointer;
}
tbody tr:hover{background:rgba(79,195,247,.07);}
tbody tr.expanded{background:rgba(79,195,247,.05);}
td{padding:11px 14px;vertical-align:middle;}

/* 部门名称 */
.dept-name{
  display:flex;align-items:center;gap:8px;font-weight:600;color:#eceff1;
}
.expand-icon{
  width:20px;height:20px;border-radius:4px;
  background:rgba(79,195,247,.15);
  display:flex;align-items:center;justify-content:center;
  font-size:12px;color:#4fc3f7;transition:transform .25s;flex-shrink:0;
}
.expand-icon.open{transform:rotate(90deg);}

/* 欠款进度条 */
.debt-bar{display:flex;height:6px;border-radius:3px;overflow:hidden;margin-top:4px;gap:1px;}
.db-seg{height:100%;transition:width .4s;}
.db-30{background:#26c6da;}
.db-3090{background:#ffa726;}
.db-90180{background:#ef5350;}
.db-180{background:#b71c1c;}

/* 账龄 tag */
.age-tag{
  display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:600;
  white-space:nowrap;
}
.tag-30{background:rgba(38,198,218,.15);color:#26c6da;}
.tag-3090{background:rgba(255,167,38,.15);color:#ffa726;}
.tag-90180{background:rgba(239,83,80,.15);color:#ef5350;}
.tag-180{background:rgba(183,28,28,.3);color:#ff5252;}
.tag-ok{background:rgba(76,175,80,.15);color:#66bb6a;}
.tag-warn{background:rgba(255,167,38,.15);color:#ffa726;}
.tag-danger{background:rgba(239,83,80,.15);color:#ef5350;}

/* 下钻子表 */
.drill-row td{padding:0;}
.drill-row{display:none;}
.drill-row.open{display:table-row;}
.drill-inner{
  background:#0d1a28;
  border-top:1px solid rgba(79,195,247,.12);
}
.drill-header{
  padding:10px 16px 8px;display:flex;align-items:center;justify-content:space-between;
}
.drill-header-title{font-size:12px;color:#4fc3f7;font-weight:600;}
.drill-search{
  padding:5px 10px;border-radius:6px;border:1px solid rgba(255,255,255,.1);
  background:rgba(255,255,255,.05);color:#e0e0e0;font-size:12px;width:180px;outline:none;
}
.drill-search:focus{border-color:#4fc3f7;}
.drill-table{width:100%;}
.drill-table th{
  padding:8px 12px;background:rgba(255,255,255,.04);font-size:11px;color:#78909c;
  border-bottom:1px solid rgba(255,255,255,.05);font-weight:600;
}
.drill-table td{padding:9px 12px;font-size:12px;border-bottom:1px solid rgba(255,255,255,.03);}
.drill-table tr:hover td{background:rgba(79,195,247,.04);}
.cust-name{font-weight:500;color:#cfd8dc;max-width:220px;}
.sales-name{color:#78909c;font-size:11px;}
.days-badge{
  display:inline-block;padding:1px 7px;border-radius:8px;font-size:11px;font-weight:600;
}
.days-ok{background:rgba(38,198,218,.15);color:#26c6da;}
.days-warn{background:rgba(255,167,38,.15);color:#ffa726;}
.days-bad{background:rgba(239,83,80,.15);color:#ef5350;}
.days-crit{background:rgba(183,28,28,.3);color:#ff5252;}

/* 空状态 */
.empty{padding:24px;text-align:center;color:#546e7a;font-size:13px;}

/* 合计行 */
.total-row td{font-weight:700;color:#eceff1;background:rgba(255,255,255,.04);}
.total-row{border-top:1px solid rgba(255,255,255,.1) !important;}

/* 图例 */
.legend{
  display:flex;gap:20px;flex-wrap:wrap;margin-bottom:16px;
  padding:12px 16px;background:rgba(255,255,255,.03);
  border-radius:8px;font-size:12px;align-items:center;
}
.legend-item{display:flex;align-items:center;gap:6px;color:#90a4ae;}
.legend-dot{width:10px;height:10px;border-radius:2px;flex-shrink:0;}

@media(max-width:900px){
  .summary-bar{grid-template-columns:repeat(3,1fr);}
  .main,.topbar,.summary-bar{padding-left:16px;padding-right:16px;}
  .cust-name{max-width:140px;}
}
@media(max-width:600px){
  .summary-bar{grid-template-columns:repeat(2,1fr);}
  .sum-val{font-size:20px;}
}
</style>
</head>

<!-- 顶部 -->
<div class="topbar">
  <div>
    <div class="topbar-title"><span>💰</span> 应收账款欠款分析</div>
    <div class="topbar-sub">中西部大区 · 26财年Q1 · 点击部门行可下钻查看客户明细</div>

  <div class="update-time" id="updateTime"></div>
</div>

<!-- 总览 -->
<div class="summary-bar">

  <div class="sum-card">

  <div class="sum-card">

    <div class="sum-pct" id="sp-d180"></div>
  </div>
</div>

<!-- 主内容 -->
<div class="main">
  <!-- 面包屑 -->
  <div class="breadcrumb" id="breadcrumb">
    <span>全部部门</span>
  </div>

    <button class="filter-btn" onclick="filterAge('d30',this)">30天内</button>
    <button class="filter-btn" onclick="filterAge('d30_90',this)">30-90天</button>
    <button class="filter-btn" onclick="filterAge('d90_180',this)">90-180天</button>
    <button class="filter-btn" onclick="filterAge('d180',this)">180天以上</button>
  </div>

  <!-- 图例 -->
  <div class="legend">
    <div class="legend-item"><div class="legend-dot" style="background:#26c6da"></div>30天内（未逾期）</div>
    <div class="legend-item"><div class="legend-dot" style="background:#ffa726"></div>30-90天（逾期）</div>
    <div class="legend-item"><div class="legend-dot" style="background:#ef5350"></div>90-180天（逾期）</div>
    <div class="legend-item"><div class="legend-dot" style="background:#b71c1c"></div>180天以上（超长逾期）</div>
    <div style="margin-left:auto;font-size:11px;color:#546e7a;">▶ 点击部门行展开客户明细</div>
  </div>

  <!-- 表格 -->
  <div class="table-wrap">
    <table id="mainTable">
      <thead>
        <tr>
          <th style="width:200px">部门</th>
          <th class="right">欠款合计（万）</th>
          <th class="right">占比</th>
          <th class="center">客户数</th>
          <th class="right">30天内</th>
          <th class="right">30-90天</th>
          <th class="right">90-180天</th>
          <th class="right">180天以上</th>
          <th style="width:160px">账龄分布</th>
        </tr>
      </thead>
      <tbody id="mainBody"></tbody>
    </table>
  </div>
</div>

let currentFilter = 'all';
let searchKeyword = '';

function fmt(v, dec=2){ return v==null?'--':v.toFixed(dec); }
function pct(a,b){ return b>0?((a/b)*100).toFixed(1)+'%':'0%'; }

function ageDayClass(days){
  if(days<=30) return 'days-ok';
  if(days<=90) return 'days-warn';
  if(days<=180) return 'days-bad';
  return 'days-crit';
}
function statusTag(s){
  if(s==='未逾期') return '<span class="age-tag tag-ok">未逾期</span>';
  if(s==='逾期') return '<span class="age-tag tag-warn">逾期</span>';
  return '<span class="age-tag tag-danger">超长逾期</span>';
}

// ===== 渲染总览 =====
function renderSummary(){
  const d = RAW;
  document.getElementById('sv-total').textContent = fmt(d.total);
  document.getElementById('sv-d30').textContent = fmt(d.total_d30);
  document.getElementById('sv-d3090').textContent = fmt(d.total_d30_90);
  document.getElementById('sv-d90180').textContent = fmt(d.total_d90_180);
  document.getElementById('sv-d180').textContent = fmt(d.total_d180);
  document.getElementById('sp-d30').textContent = pct(d.total_d30, d.total);
  document.getElementById('sp-d3090').textContent = pct(d.total_d30_90, d.total);
  document.getElementById('sp-d90180').textContent = pct(d.total_d90_180, d.total);
  document.getElementById('sp-d180').textContent = pct(d.total_d180, d.total);
  document.getElementById('updateTime').textContent = '数据截至 ' + new Date().toLocaleDateString('zh-CN');
}

// ===== 进度条 =====
function barHtml(row, total){
  const w30 = total>0?(row.d30/total*100).toFixed(1):0;
  const w3090 = total>0?(row.d30_90/total*100).toFixed(1):0;
  const w90180 = total>0?(row.d90_180/total*100).toFixed(1):0;
  const w180 = total>0?(row.d180/total*100).toFixed(1):0;
  return `<div>
    <div style="font-size:11px;color:#546e7a;display:flex;gap:6px;margin-bottom:3px;">
      <span style="color:#26c6da">${fmt(row.d30)}</span>
      <span style="color:#ffa726">${fmt(row.d30_90)}</span>
      <span style="color:#ef5350">${fmt(row.d90_180)}</span>
      <span style="color:#ff5252">${fmt(row.d180)}</span>
    </div>
    <div class="debt-bar">
      <div class="db-seg db-30" style="width:${w30}%"></div>
      <div class="db-seg db-3090" style="width:${w3090}%"></div>
      <div class="db-seg db-90180" style="width:${w90180}%"></div>
      <div class="db-seg db-180" style="width:${w180}%"></div>
    </div>
  </div>`;
}

// ===== 渲染部门表 =====
function renderDepts(){
  const tbody = document.getElementById('mainBody');
  tbody.innerHTML = '';
  const depts = RAW.depts;
  const total = RAW.total;

  // 过滤
  let filtered = depts;
  if(currentFilter !== 'all'){
    const keyMap = {d30:'d30',d30_90:'d30_90',d90_180:'d90_180',d180:'d180'};
    filtered = depts.filter(d => d[keyMap[currentFilter]] > 0);
  }
  if(searchKeyword){
    filtered = filtered.filter(d => d.dept.includes(searchKeyword));
  }

  document.getElementById('toolbar-title').textContent =
    `各部门欠款汇总（${filtered.length} / ${depts.length} 个部门）`;

  if(!filtered.length){
    tbody.innerHTML = `<tr><td colspan="9" class="empty">暂无匹配数据</td></tr>`;
    return;
  }

  filtered.forEach((row, i) => {
    const deptId = 'dept_' + encodeURIComponent(row.dept);
    const tr = document.createElement('tr');
    tr.className = 'dept-row';
    tr.dataset.dept = row.dept;
    tr.onclick = () => toggleDrill(row.dept, deptId);
    tr.innerHTML = `
      <td>
        <div class="dept-name">
          <div class="expand-icon" id="icon_${deptId}">▶</div>
          ${row.dept}
        </div>
      </td>
      <td class="right"><strong style="color:#ef5350">${fmt(row.total)}</strong></td>
      <td class="right" style="color:#78909c">${pct(row.total, total)}</td>
      <td class="center"><span style="color:#81d4fa">${row.cust_count}</span></td>
      <td class="right" style="color:#26c6da">${fmt(row.d30)}</td>
      <td class="right" style="color:#ffa726">${fmt(row.d30_90)}</td>
      <td class="right" style="color:#ef5350">${fmt(row.d90_180)}</td>
      <td class="right" style="color:#ff5252">${fmt(row.d180)}</td>
      <td>${barHtml(row, row.total)}</td>
    `;
    tbody.appendChild(tr);

    // 下钻行（默认隐藏）
    const drillTr = document.createElement('tr');
    drillTr.className = 'drill-row';
    drillTr.id = 'drill_' + deptId;
    drillTr.innerHTML = `<td colspan="9" style="padding:0;">
      <div class="drill-inner" id="inner_${deptId}"></div>
    </td>`;
    tbody.appendChild(drillTr);
  });

  // 合计行
  const sumRow = document.createElement('tr');
  sumRow.className = 'total-row';
  const totalD30 = filtered.reduce((a,b)=>a+b.d30,0);
  const totalD3090 = filtered.reduce((a,b)=>a+b.d30_90,0);
  const totalD90180 = filtered.reduce((a,b)=>a+b.d90_180,0);
  const totalD180 = filtered.reduce((a,b)=>a+b.d180,0);
  const totalAll = filtered.reduce((a,b)=>a+b.total,0);
  sumRow.innerHTML = `
    <td><strong>合计</strong></td>
    <td class="right"><strong style="color:#ef5350">${fmt(totalAll)}</strong></td>
    <td class="right">—</td>
    <td class="center"><strong>${filtered.reduce((a,b)=>a+b.cust_count,0)}</strong></td>
    <td class="right" style="color:#26c6da"><strong>${fmt(totalD30)}</strong></td>
    <td class="right" style="color:#ffa726"><strong>${fmt(totalD3090)}</strong></td>
    <td class="right" style="color:#ef5350"><strong>${fmt(totalD90180)}</strong></td>
    <td class="right" style="color:#ff5252"><strong>${fmt(totalD180)}</strong></td>
    <td>${barHtml({d30:totalD30,d30_90:totalD3090,d90_180:totalD90180,d180:totalD180}, totalAll)}</td>
  `;
  tbody.appendChild(sumRow);
}

// ===== 切换下钻 =====
const openDrills = new Set();
function toggleDrill(dept, deptId){
  const drillRow = document.getElementById('drill_' + deptId);
  const icon = document.getElementById('icon_' + deptId);
  if(!drillRow) return;
  if(openDrills.has(dept)){
    drillRow.classList.remove('open');
    icon.classList.remove('open');
    openDrills.delete(dept);
  } else {
    drillRow.classList.add('open');
    icon.classList.add('open');
    openDrills.add(dept);
    renderCustTable(dept, deptId, '');
  }
}

// ===== 渲染客户明细 =====
function renderCustTable(dept, deptId, keyword){
  const inner = document.getElementById('inner_' + deptId);
  const custs = RAW.customers[dept] || [];
  let list = custs;
  if(keyword) list = custs.filter(c =>
    c.name.includes(keyword) || c.sales.includes(keyword)
  );

  const deptTotal = custs.reduce((a,b)=>a+b.total,0);

  inner.innerHTML = `
    <div class="drill-header">
      <div class="drill-header-title">📌 ${dept} · 客户明细（${list.length} 条）</div>
      <input class="drill-search" placeholder="搜索客户/销售员..."
        oninput="renderCustTable('${dept}','${deptId}',this.value)"
        value="${keyword}">
    </div>
    <table class="drill-table">
      <thead>
        <tr>
          <th>客户名称</th>
          <th class="right">欠款金额（万）</th>
          <th class="right">部门占比</th>
          <th class="right">30天内</th>
          <th class="right">30-90天</th>
          <th class="right">90-180天</th>
          <th class="right">180天以上</th>
          <th class="center">最长账龄</th>
          <th class="center">订单数</th>
          <th>负责销售员</th>
        </tr>
      </thead>
      <tbody>
        ${list.length === 0 ? `<tr><td colspan="10" class="empty">无匹配客户</td></tr>` :
          list.map(c => `
            <tr>
              <td><div class="cust-name">${c.name}</div></td>
              <td class="right"><strong style="color:#ef5350">${fmt(c.total)}</strong></td>
              <td class="right" style="color:#78909c">${pct(c.total, deptTotal)}</td>
              <td class="right" style="color:#26c6da">${c.d30>0?fmt(c.d30):'—'}</td>
              <td class="right" style="color:#ffa726">${c.d30_90>0?fmt(c.d30_90):'—'}</td>
              <td class="right" style="color:#ef5350">${c.d90_180>0?fmt(c.d90_180):'—'}</td>
              <td class="right" style="color:#ff5252">${c.d180>0?fmt(c.d180):'—'}</td>
              <td class="center">
                <span class="days-badge ${ageDayClass(c.max_days)}">${c.max_days}天</span>
              </td>
              <td class="center" style="color:#81d4fa">${c.orders}</td>
              <td><div class="sales-name">${c.sales||'—'}</div></td>
            </tr>
          `).join('')
        }
        ${list.length > 0 ? `
        <tr class="total-row">
          <td><strong>小计</strong></td>
          <td class="right"><strong style="color:#ef5350">${fmt(list.reduce((a,b)=>a+b.total,0))}</strong></td>
          <td class="right">—</td>
          <td class="right" style="color:#26c6da">${fmt(list.reduce((a,b)=>a+b.d30,0))}</td>
          <td class="right" style="color:#ffa726">${fmt(list.reduce((a,b)=>a+b.d30_90,0))}</td>
          <td class="right" style="color:#ef5350">${fmt(list.reduce((a,b)=>a+b.d90_180,0))}</td>
          <td class="right" style="color:#ff5252">${fmt(list.reduce((a,b)=>a+b.d180,0))}</td>
          <td class="center">—</td>
          <td class="center">${list.reduce((a,b)=>a+b.orders,0)}</td>
          <td>—</td>
        </tr>` : ''}
      </tbody>
    </table>
  `;
}

function doSearch(){
  searchKeyword = document.getElementById('searchInput').value.trim();
  renderDepts();
}

function filterAge(key, btn){
  currentFilter = key;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  openDrills.clear();
  renderDepts();
}

// ===== 初始化 =====
renderSummary();
renderDepts();
</script>
