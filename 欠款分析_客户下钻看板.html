<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>欠款分析 · 客户下钻看板</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;
  background:#0f1923;color:#e0e0e0;min-height:100vh;
}

/* ===== 顶部 ===== */
.topbar{
  background:linear-gradient(90deg,#1a2740,#1e3050);
  border-bottom:1px solid rgba(255,255,255,.08);
  padding:16px 32px;
  display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:100;
}
.topbar-left{display:flex;align-items:center;gap:12px;}
.back-btn{
  display:none;padding:6px 14px;border-radius:8px;border:1px solid rgba(255,255,255,.15);
  background:rgba(255,255,255,.06);color:#b0bec5;font-size:13px;cursor:pointer;
  transition:all .2s;
}
.back-btn:hover{background:rgba(255,255,255,.12);color:#fff;}
.topbar-title{font-size:17px;font-weight:700;color:#fff;}
.topbar-sub{font-size:12px;color:#78909c;margin-top:2px;}
.update-time{font-size:12px;color:#546e7a;}

/* ===== 总览卡片 ===== */
.summary-bar{
  display:grid;grid-template-columns:repeat(5,1fr);gap:14px;
  padding:20px 32px;
}
.sum-card{
  background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);
  border-radius:12px;padding:16px 18px;text-align:center;
}
.sum-card.total{border-color:rgba(239,83,80,.35);background:rgba(239,83,80,.08);}
.sum-val{font-size:24px;font-weight:700;margin-bottom:3px;}
.sum-card.total .sum-val{color:#ef5350;}
.sum-card:nth-child(2) .sum-val{color:#26c6da;}
.sum-card:nth-child(3) .sum-val{color:#ffa726;}
.sum-card:nth-child(4) .sum-val{color:#ef5350;}
.sum-card:nth-child(5) .sum-val{color:#ff1744;}
.sum-label{font-size:12px;color:#78909c;}
.sum-pct{font-size:11px;color:#546e7a;margin-top:2px;}

/* ===== 内容区 ===== */
.main{padding:0 32px 48px;}

/* 面包屑 */
.breadcrumb{
  display:flex;align-items:center;gap:6px;
  padding:12px 0 14px;font-size:13px;color:#78909c;
  border-bottom:1px solid rgba(255,255,255,.05);margin-bottom:18px;
}
.bc-link{color:#4fc3f7;cursor:pointer;transition:opacity .15s;}
.bc-link:hover{opacity:.7;text-decoration:underline;}
.bc-sep{color:#37474f;}
.bc-cur{color:#cfd8dc;}

/* 工具栏 */
.toolbar{display:flex;align-items:center;gap:10px;margin-bottom:14px;flex-wrap:wrap;}
.toolbar-title{font-size:14px;font-weight:600;color:#cfd8dc;flex:1;}
.search-box{
  padding:7px 13px;border-radius:8px;border:1px solid rgba(255,255,255,.12);
  background:rgba(255,255,255,.06);color:#e0e0e0;font-size:13px;width:200px;outline:none;
}
.search-box:focus{border-color:#4fc3f7;}
.search-box::placeholder{color:#546e7a;}
.filter-btn{
  padding:6px 12px;border-radius:8px;border:1px solid rgba(255,255,255,.12);
  background:rgba(255,255,255,.06);color:#b0bec5;font-size:12px;cursor:pointer;transition:all .2s;
}
.filter-btn:hover,.filter-btn.active{background:rgba(79,195,247,.15);border-color:#4fc3f7;color:#4fc3f7;}

/* 图例 */
.legend{
  display:flex;gap:18px;flex-wrap:wrap;margin-bottom:14px;
  padding:10px 14px;background:rgba(255,255,255,.03);border-radius:8px;
  font-size:12px;align-items:center;
}
.legend-item{display:flex;align-items:center;gap:5px;color:#90a4ae;}
.legend-dot{width:10px;height:10px;border-radius:2px;flex-shrink:0;}

/* ===== 表格通用 ===== */
.table-wrap{overflow-x:auto;border-radius:12px;border:1px solid rgba(255,255,255,.07);}
table{width:100%;border-collapse:collapse;font-size:13px;}
thead tr{background:rgba(255,255,255,.06);}
th{
  padding:11px 14px;text-align:left;color:#90a4ae;font-weight:600;
  font-size:12px;white-space:nowrap;border-bottom:1px solid rgba(255,255,255,.06);
}
th.right,td.right{text-align:right;}
th.center,td.center{text-align:center;}
tbody tr{border-bottom:1px solid rgba(255,255,255,.04);transition:background .15s;}
td{padding:11px 14px;vertical-align:middle;}
.total-row td{font-weight:700;color:#eceff1;background:rgba(255,255,255,.04);border-top:1px solid rgba(255,255,255,.1);}

/* ===== 部门行 ===== */
.dept-row{cursor:pointer;}
.dept-row:hover{background:rgba(79,195,247,.07);}
.dept-row.is-open{background:rgba(79,195,247,.05);}
.dept-name-cell{display:flex;align-items:center;gap:8px;font-weight:600;color:#eceff1;}
.expand-icon{
  width:20px;height:20px;border-radius:4px;
  background:rgba(79,195,247,.15);display:flex;align-items:center;
  justify-content:center;font-size:11px;color:#4fc3f7;
  transition:transform .25s;flex-shrink:0;
}
.expand-icon.open{transform:rotate(90deg);}

/* 欠款进度条 */
.debt-bar{display:flex;height:5px;border-radius:3px;overflow:hidden;gap:1px;margin-top:4px;}
.db-seg{height:100%;}
.db-30{background:#26c6da;}.db-3090{background:#ffa726;}
.db-90180{background:#ef5350;}.db-180{background:#b71c1c;}
.bar-nums{font-size:10px;display:flex;gap:6px;margin-bottom:2px;}

/* ===== 二级：销售员面板 ===== */
.drill1-row{display:none;}
.drill1-row.open{display:table-row;}
.drill1-row > td{padding:0;}
.sales-panel{
  background:#0d1a28;border-top:2px solid rgba(79,195,247,.2);
  padding:0 0 12px 0;
}
.sales-panel-header{
  padding:12px 20px 10px;display:flex;align-items:center;justify-content:space-between;
  border-bottom:1px solid rgba(255,255,255,.05);
}
.sales-panel-title{
  font-size:13px;font-weight:700;color:#4fc3f7;display:flex;align-items:center;gap:6px;
}
/* 销售员卡片网格 */
.sales-grid{
  display:flex;flex-wrap:wrap;gap:10px;padding:14px 20px;
}
.sales-card{
  background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.09);
  border-radius:10px;padding:13px 16px;cursor:pointer;
  min-width:150px;flex:1;max-width:200px;
  transition:all .2s;position:relative;
}
.sales-card:hover{
  background:rgba(79,195,247,.12);border-color:rgba(79,195,247,.4);
  transform:translateY(-2px);box-shadow:0 4px 20px rgba(0,0,0,.3);
}
.sales-card.active{
  background:rgba(79,195,247,.18);border-color:#4fc3f7;
}
.sc-name{font-size:14px;font-weight:700;color:#eceff1;margin-bottom:6px;}
.sc-total{font-size:18px;font-weight:700;color:#ef5350;margin-bottom:2px;}
.sc-sub{font-size:11px;color:#78909c;}
.sc-bar{display:flex;height:3px;border-radius:2px;overflow:hidden;gap:1px;margin-top:8px;}
.sc-arrow{
  position:absolute;right:10px;top:10px;font-size:12px;color:#4fc3f7;opacity:0;transition:opacity .2s;
}
.sales-card:hover .sc-arrow,.sales-card.active .sc-arrow{opacity:1;}

/* ===== 三级：客户明细抽屉 ===== */
.cust-drawer{
  display:none;
  background:#081320;border-top:1px solid rgba(79,195,247,.15);
  padding:0;
}
.cust-drawer.open{display:block;}
.cust-drawer-header{
  padding:10px 20px;display:flex;align-items:center;justify-content:space-between;
  background:rgba(79,195,247,.06);border-bottom:1px solid rgba(255,255,255,.05);
}
.cust-drawer-title{font-size:12px;font-weight:700;color:#81d4fa;display:flex;align-items:center;gap:6px;}
.cust-search{
  padding:5px 10px;border-radius:6px;border:1px solid rgba(255,255,255,.1);
  background:rgba(255,255,255,.05);color:#e0e0e0;font-size:12px;width:180px;outline:none;
}
.cust-search:focus{border-color:#4fc3f7;}
.cust-table{width:100%;font-size:12px;border-collapse:collapse;}
.cust-table th{
  padding:8px 14px;background:rgba(255,255,255,.03);font-size:11px;color:#78909c;
  font-weight:600;border-bottom:1px solid rgba(255,255,255,.04);text-align:left;
}
.cust-table th.right,.cust-table td.right{text-align:right;}
.cust-table th.center,.cust-table td.center{text-align:center;}
.cust-table td{padding:9px 14px;border-bottom:1px solid rgba(255,255,255,.03);color:#cfd8dc;}
.cust-table tr:hover td{background:rgba(79,195,247,.04);}
.cust-table .sub-total td{
  font-weight:700;background:rgba(255,255,255,.04);border-top:1px solid rgba(255,255,255,.08);
}

/* 标签 */
.days-badge{
  display:inline-block;padding:1px 8px;border-radius:10px;font-size:11px;font-weight:600;
}
.d-ok{background:rgba(38,198,218,.15);color:#26c6da;}
.d-warn{background:rgba(255,167,38,.15);color:#ffa726;}
.d-bad{background:rgba(239,83,80,.15);color:#ef5350;}
.d-crit{background:rgba(183,28,28,.3);color:#ff5252;}

.empty-msg{padding:24px;text-align:center;color:#546e7a;font-size:13px;}

/* 加载状态 */
.loading-msg{padding:60px 20px;text-align:center;color:#4fc3f7;font-size:15px;}

@media(max-width:900px){
  .summary-bar{grid-template-columns:repeat(3,1fr);}
  .main,.topbar,.summary-bar{padding-left:16px;padding-right:16px;}
  .sales-card{min-width:130px;}
}
@media(max-width:600px){
  .summary-bar{grid-template-columns:repeat(2,1fr);}
  .sum-val{font-size:20px;}
  .sales-grid{gap:8px;}
}
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-left">
    <button class="back-btn" id="backBtn" onclick="goBack()">← 返回</button>
    <div>
      <div class="topbar-title">💰 应收账款欠款分析</div>
      <div class="topbar-sub">中西部大区 · 26财年Q1 · 点击部门展开销售员，点击销售员查看客户欠款</div>
    </div>
  </div>
  <div class="update-time" id="updateTime"></div>
</div>

<div class="summary-bar">
  <div class="sum-card total"><div class="sum-val" id="sv-total">--</div><div class="sum-label">欠款总额（万元）</div></div>
  <div class="sum-card"><div class="sum-val" id="sv-d30">--</div><div class="sum-label">30天内</div><div class="sum-pct" id="sp-d30"></div></div>
  <div class="sum-card"><div class="sum-val" id="sv-d3090">--</div><div class="sum-label">30-90天</div><div class="sum-pct" id="sp-d3090"></div></div>
  <div class="sum-card"><div class="sum-val" id="sv-d90180">--</div><div class="sum-label">90-180天</div><div class="sum-pct" id="sp-d90180"></div></div>
  <div class="sum-card"><div class="sum-val" id="sv-d180">--</div><div class="sum-label">180天以上</div><div class="sum-pct" id="sp-d180"></div></div>
</div>

<div class="main">
  <div class="breadcrumb" id="breadcrumb">
    <span class="bc-cur">全部部门</span>
  </div>

  <div class="toolbar">
    <div class="toolbar-title" id="toolbarTitle">各部门欠款汇总</div>
    <input class="search-box" id="searchInput" placeholder="🔍 搜索部门名称..." oninput="onSearch()">
    <button class="filter-btn active" onclick="setFilter('all',this)">全部</button>
    <button class="filter-btn" onclick="setFilter('d30',this)">30天内</button>
    <button class="filter-btn" onclick="setFilter('d30_90',this)">30-90天</button>
    <button class="filter-btn" onclick="setFilter('d90_180',this)">90-180天</button>
    <button class="filter-btn" onclick="setFilter('d180',this)">180天以上</button>
  </div>

  <div class="legend">
    <div class="legend-item"><div class="legend-dot" style="background:#26c6da"></div>30天内</div>
    <div class="legend-item"><div class="legend-dot" style="background:#ffa726"></div>30-90天</div>
    <div class="legend-item"><div class="legend-dot" style="background:#ef5350"></div>90-180天</div>
    <div class="legend-item"><div class="legend-dot" style="background:#b71c1c"></div>180天以上</div>
    <div style="margin-left:auto;font-size:11px;color:#546e7a">▶ 点击部门展开 → 点击销售员卡片查看客户</div>
  </div>

  <div class="table-wrap">
    <table id="mainTable">
      <thead>
        <tr>
          <th style="width:190px">部门</th>
          <th class="right">欠款合计（万）</th>
          <th class="right">占比</th>
          <th class="center">销售员数</th>
          <th class="center">客户数</th>
          <th class="right">30天内</th>
          <th class="right">30-90天</th>
          <th class="right">90-180天</th>
          <th class="right">180天以上</th>
          <th style="width:150px">账龄分布</th>
        </tr>
      </thead>
      <tbody id="mainBody">
        <tr><td colspan="10" class="loading-msg">⏳ 正在加载数据...</td></tr>
      </tbody>
    </table>
  </div>
</div>

<script>
let RAW = null;

let curFilter = 'all';
let curSearch = '';
const deptOpenSales = {};

function fmt(v, d=2){ return v==null?'--':Number(v).toFixed(d); }
function pct(a,b){ return b>0?((a/b)*100).toFixed(1)+'%':'0%'; }
function daysClass(n){ return n<=30?'d-ok':n<=90?'d-warn':n<=180?'d-bad':'d-crit'; }

function barHtml(row, rowTotal){
  const w = k => rowTotal>0?((row[k]/rowTotal)*100).toFixed(1):0;
  return `
    <div class="bar-nums">
      <span style="color:#26c6da">${fmt(row.d30)}</span>
      <span style="color:#ffa726">${fmt(row.d30_90)}</span>
      <span style="color:#ef5350">${fmt(row.d90_180)}</span>
      <span style="color:#ff5252">${fmt(row.d180)}</span>
    </div>
    <div class="debt-bar">
      <div class="db-seg db-30" style="width:${w('d30')}%"></div>
      <div class="db-seg db-3090" style="width:${w('d30_90')}%"></div>
      <div class="db-seg db-90180" style="width:${w('d90_180')}%"></div>
      <div class="db-seg db-180" style="width:${w('d180')}%"></div>
    </div>`;
}

function scBarHtml(s, total){
  const w = k => total>0?((s[k]/total)*100).toFixed(1):0;
  return `<div class="sc-bar">
    <div class="db-seg db-30" style="width:${w('d30')}%"></div>
    <div class="db-seg db-3090" style="width:${w('d30_90')}%"></div>
    <div class="db-seg db-90180" style="width:${w('d90_180')}%"></div>
    <div class="db-seg db-180" style="width:${w('d180')}%"></div>
  </div>`;
}

function initSummary(){
  const d = RAW;
  document.getElementById('sv-total').textContent = fmt(d.total);
  document.getElementById('sv-d30').textContent = fmt(d.total_d30);
  document.getElementById('sv-d3090').textContent = fmt(d.total_d30_90);
  document.getElementById('sv-d90180').textContent = fmt(d.total_d90_180);
  document.getElementById('sv-d180').textContent = fmt(d.total_d180);
  document.getElementById('sp-d30').textContent = pct(d.total_d30, d.total);
  document.getElementById('sp-d3090').textContent = pct(d.total_d30_90, d.total);
  document.getElementById('sp-d90180').textContent = pct(d.total_d90_180, d.total);
  document.getElementById('sp-d180').textContent = pct(d.total_d180, d.total);
  document.getElementById('updateTime').textContent = '数据截至 ' + new Date().toLocaleDateString('zh-CN');
}

function renderDepts(){
  const tbody = document.getElementById('mainBody');
  tbody.innerHTML = '';
  const total = RAW.total;

  let list = [...RAW.depts];
  if(curFilter !== 'all'){
    const keyMap = {d30:'d30',d30_90:'d30_90',d90_180:'d90_180',d180:'d180'};
    list = list.filter(d => d[keyMap[curFilter]] > 0);
  }
  if(curSearch) list = list.filter(d => d.dept.includes(curSearch));

  document.getElementById('toolbarTitle').textContent = '各部门欠款汇总（' + list.length + ' / ' + RAW.depts.length + ' 个部门）';

  if(!list.length){
    tbody.innerHTML = '<tr><td colspan="10" class="empty-msg">暂无匹配数据</td></tr>';
    return;
  }

  list.forEach(row => {
    const did = 'dept_' + row.dept.replace(/[^a-zA-Z0-9\u4e00-\u9fa5]/g,'_');

    const tr = document.createElement('tr');
    tr.className = 'dept-row';
    tr.id = 'drow_' + did;
    tr.onclick = function(){ toggleDept(row.dept, did); };
    tr.innerHTML =
      '<td><div class="dept-name-cell">' +
        '<div class="expand-icon" id="icon_' + did + '">▶</div>' + row.dept +
      '</div></td>' +
      '<td class="right"><strong style="color:#ef5350">' + fmt(row.total) + '</strong></td>' +
      '<td class="right" style="color:#78909c">' + pct(row.total, total) + '</td>' +
      '<td class="center" style="color:#81d4fa">' + row.sales_count + '</td>' +
      '<td class="center" style="color:#b0bec5">' + row.cust_count + '</td>' +
      '<td class="right" style="color:#26c6da">' + fmt(row.d30) + '</td>' +
      '<td class="right" style="color:#ffa726">' + fmt(row.d30_90) + '</td>' +
      '<td class="right" style="color:#ef5350">' + fmt(row.d90_180) + '</td>' +
      '<td class="right" style="color:#ff5252">' + fmt(row.d180) + '</td>' +
      '<td>' + barHtml(row, row.total) + '</td>';
    tbody.appendChild(tr);

    const dr = document.createElement('tr');
    dr.className = 'drill1-row';
    dr.id = 'drill1_' + did;
    dr.innerHTML = '<td colspan="10" style="padding:0"><div class="sales-panel" id="spanel_' + did + '"></div></td>';
    tbody.appendChild(dr);
  });

  // 合计行
  const tD30=list.reduce((a,b)=>a+b.d30,0), tD3090=list.reduce((a,b)=>a+b.d30_90,0);
  const tD90180=list.reduce((a,b)=>a+b.d90_180,0), tD180=list.reduce((a,b)=>a+b.d180,0);
  const tAll=list.reduce((a,b)=>a+b.total,0);
  const sumTr = document.createElement('tr');
  sumTr.className = 'total-row';
  sumTr.innerHTML =
    '<td><strong>合计</strong></td>' +
    '<td class="right"><strong style="color:#ef5350">' + fmt(tAll) + '</strong></td>' +
    '<td class="right">—</td>' +
    '<td class="center">' + list.reduce((a,b)=>a+b.sales_count,0) + '</td>' +
    '<td class="center">' + list.reduce((a,b)=>a+b.cust_count,0) + '</td>' +
    '<td class="right" style="color:#26c6da"><strong>' + fmt(tD30) + '</strong></td>' +
    '<td class="right" style="color:#ffa726"><strong>' + fmt(tD3090) + '</strong></td>' +
    '<td class="right" style="color:#ef5350"><strong>' + fmt(tD90180) + '</strong></td>' +
    '<td class="right" style="color:#ff5252"><strong>' + fmt(tD180) + '</strong></td>' +
    '<td>' + barHtml({d30:tD30,d30_90:tD3090,d90_180:tD90180,d180:tD180},tAll) + '</td>';
  tbody.appendChild(sumTr);
}

const openDepts = new Set();
function toggleDept(dept, did){
  const drill = document.getElementById('drill1_' + did);
  const icon  = document.getElementById('icon_' + did);
  const drow  = document.getElementById('drow_' + did);
  if(!drill) return;
  if(openDepts.has(dept)){
    drill.classList.remove('open');
    icon.classList.remove('open');
    drow.classList.remove('is-open');
    openDepts.delete(dept);
  } else {
    drill.classList.add('open');
    icon.classList.add('open');
    drow.classList.add('is-open');
    openDepts.add(dept);
    renderSalesPanel(dept, did, null);
  }
}

function renderSalesPanel(dept, did, activeSales){
  const panel = document.getElementById('spanel_' + did);
  const salesList = RAW.dept_sales[dept] || [];
  const deptTotal = salesList.reduce((a,b)=>a+b.total, 0);
  deptOpenSales[did] = activeSales;

  let cardsHtml = '';
  salesList.forEach(function(s){
    const sid = did + '_' + s.name.replace(/[^a-zA-Z0-9\u4e00-\u9fa5]/g,'_');
    const isActive = s.name === activeSales;
    cardsHtml +=
      '<div class="sales-card ' + (isActive?'active':'') + '" id="sc_' + sid + '" ' +
        'onclick="clickSales(\'' + dept + '\',\'' + did + '\',\'' + s.name + '\')">' +
        '<div class="sc-arrow">▼</div>' +
        '<div class="sc-name">' + s.name + '</div>' +
        '<div class="sc-total">' + fmt(s.total) + ' 万</div>' +
        '<div class="sc-sub">' + s.cust_count + ' 个客户</div>' +
        scBarHtml(s, s.total) +
      '</div>';
  });

  panel.innerHTML =
    '<div class="sales-panel-header">' +
      '<div class="sales-panel-title">💼 ' + dept + ' · 销售员欠款（' + salesList.length + ' 人，合计 ' + fmt(deptTotal) + ' 万）</div>' +
      '<span style="font-size:12px;color:#546e7a">点击销售员卡片查看客户明细 ▼</span>' +
    '</div>' +
    '<div class="sales-grid" id="sgrid_' + did + '">' + cardsHtml + '</div>' +
    '<div class="cust-drawer ' + (activeSales?'open':'') + '" id="cdrawer_' + did + '">' +
      (activeSales ? custDrawerHtml(dept, did, activeSales, '') : '') +
    '</div>';
}

function clickSales(dept, did, salesName){
  const prev = deptOpenSales[did];
  if(prev === salesName){
    deptOpenSales[did] = null;
    renderSalesPanel(dept, did, null);
    return;
  }
  deptOpenSales[did] = salesName;
  renderSalesPanel(dept, did, salesName);
  setTimeout(function(){
    const el = document.getElementById('cdrawer_'+did);
    if(el) el.scrollIntoView({behavior:'smooth',block:'nearest'});
  }, 50);
}

function custDrawerHtml(dept, did, salesName, keyword){
  const salesList = RAW.dept_sales[dept] || [];
  const salesObj = salesList.find(function(s){ return s.name === salesName; });
  if(!salesObj) return '';
  let custs = salesObj.custs;
  if(keyword) custs = custs.filter(function(c){ return c.name.includes(keyword); });
  const salesTotal = salesObj.total;

  let rows = '';
  custs.forEach(function(c){
    rows +=
      '<tr>' +
        '<td style="max-width:220px;font-weight:500">' + c.name + '</td>' +
        '<td class="right"><strong style="color:#ef5350">' + fmt(c.total) + '</strong></td>' +
        '<td class="right" style="color:#78909c">' + pct(c.total, salesTotal) + '</td>' +
        '<td class="right" style="color:#26c6da">' + (c.d30>0?fmt(c.d30):'—') + '</td>' +
        '<td class="right" style="color:#ffa726">' + (c.d30_90>0?fmt(c.d30_90):'—') + '</td>' +
        '<td class="right" style="color:#ef5350">' + (c.d90_180>0?fmt(c.d90_180):'—') + '</td>' +
        '<td class="right" style="color:#ff5252">' + (c.d180>0?fmt(c.d180):'—') + '</td>' +
        '<td class="center"><span class="days-badge ' + daysClass(c.max_days) + '">' + c.max_days + '天</span></td>' +
        '<td class="center" style="color:#81d4fa">' + c.orders + '</td>' +
      '</tr>';
  });

  const sub = function(k){ return custs.reduce(function(a,b){ return a+b[k]; }, 0); };

  let subRow = '';
  if(custs.length){
    subRow =
      '<tr class="sub-total">' +
        '<td><strong>小计</strong></td>' +
        '<td class="right"><strong style="color:#ef5350">' + fmt(sub('total')) + '</strong></td>' +
        '<td class="right">—</td>' +
        '<td class="right" style="color:#26c6da">' + fmt(sub('d30')) + '</td>' +
        '<td class="right" style="color:#ffa726">' + fmt(sub('d30_90')) + '</td>' +
        '<td class="right" style="color:#ef5350">' + fmt(sub('d90_180')) + '</td>' +
        '<td class="right" style="color:#ff5252">' + fmt(sub('d180')) + '</td>' +
        '<td class="center">—</td>' +
        '<td class="center">' + sub('orders') + '</td>' +
      '</tr>';
  }

  return '<div class="cust-drawer-header">' +
      '<div class="cust-drawer-title">👤 ' + salesName + ' · 客户欠款明细（共 ' + custs.length + ' 客户）</div>' +
      '<input class="cust-search" placeholder="搜索客户名称..." ' +
        'oninput="filterCust(\'' + dept + '\',\'' + did + '\',\'' + salesName + '\',this.value)" ' +
        'value="' + (keyword||'') + '">' +
    '</div>' +
    '<table class="cust-table"><thead><tr>' +
      '<th>客户名称</th>' +
      '<th class="right">欠款金额（万）</th>' +
      '<th class="right">销售员占比</th>' +
      '<th class="right">30天内</th>' +
      '<th class="right">30-90天</th>' +
      '<th class="right">90-180天</th>' +
      '<th class="right">180天以上</th>' +
      '<th class="center">最长账龄</th>' +
      '<th class="center">订单数</th>' +
    '</tr></thead><tbody>' +
      (custs.length ? rows : '<tr><td colspan="9" class="empty-msg">无匹配客户</td></tr>') +
      subRow +
    '</tbody></table>';
}

function filterCust(dept, did, salesName, kw){
  const drawer = document.getElementById('cdrawer_' + did);
  if(drawer) drawer.innerHTML = custDrawerHtml(dept, did, salesName, kw);
}

function setFilter(key, btn){
  curFilter = key;
  document.querySelectorAll('.filter-btn').forEach(function(b){ b.classList.remove('active'); });
  btn.classList.add('active');
  openDepts.clear();
  renderDepts();
}

function onSearch(){
  curSearch = document.getElementById('searchInput').value.trim();
  openDepts.clear();
  renderDepts();
}

function goBack(){}

// ===== 从外部 JSON 加载数据（避免数据截断）=====
fetch('debt_drill.json')
  .then(function(r){
    if(!r.ok) throw new Error('HTTP ' + r.status);
    return r.json();
  })
  .then(function(data){
    RAW = data;
    initSummary();
    renderDepts();
  })
  .catch(function(err){
    console.error('数据加载失败:', err);
    document.getElementById('mainBody').innerHTML =
      '<tr><td colspan="10" class="empty-msg" style="color:#ef5350">数据加载失败，请确保 debt_drill.json 与本文件在同一目录</td></tr>';
  });
</script>
