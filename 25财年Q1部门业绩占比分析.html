<html lang="zh-CN">
<head>

    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Microsoft YaHei', Arial, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            padding: 20px;
            color: #fff;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        .header h1 {
            font-size: 28px;
            color: #fff;
            margin-bottom: 10px;
        }
        .header .subtitle {
            color: #a0a0a0;
            font-size: 14px;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-bottom: 20px;
        }
        .stat-card {
            background: rgba(30, 33, 45, 0.95);
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 5px 20px rgba(0,0,0,0.2);
        }
        .stat-card .value {
            font-size: 28px;
            font-weight: bold;
            color: #fff;
        }
        .stat-card .label {
            font-size: 12px;
            color: #888;
            margin-top: 5px;
        }
        .stat-card.highlight .value { color: #e74c3c; }
        .stat-card.warning .value { color: #f39c12; }
        .stat-card.good .value { color: #27ae60; }
        
        .chart-container {
            background: rgba(30, 33, 45, 0.95);
            border-radius: 16px;
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
        }
        .chart-title {
            font-size: 18px;
            color: #fff;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .chart-title .icon {
            font-size: 24px;
        }
        .back-btn {
            display: none;
            padding: 10px 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            color: #fff;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            margin-bottom: 15px;
        }
        .back-btn.show {
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .back-btn:hover {
            opacity: 0.9;
            transform: translateX(-3px);
        }
        
        .pie-wrapper {
            display: flex;
            align-items: flex-start;
            gap: 40px;
            flex-wrap: wrap;
        }
        .pie-container {
            width: 600px;
            height: 450px;
            position: relative;
        }
        .pie-legend {
            flex: 1;
            min-width: 300px;
        }
        .legend-title {
            font-size: 16px;
            color: #fff;
            font-weight: 600;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid rgba(255,255,255,0.1);
        }
        .legend-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            cursor: pointer;
            transition: background 0.2s;
            border-radius: 6px;
            padding-left: 10px;
            padding-right: 10px;
        }
        .legend-item:hover {
            background: rgba(255,255,255,0.08);
        }
        .legend-item-left {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .legend-color {
            width: 16px;
            height: 16px;
            border-radius: 4px;
        }
        .legend-dept {
            font-weight: 600;
            color: #e0e0e0;
            font-size: 14px;
        }
        .legend-right {
            text-align: right;
        }
        .legend-value {
            font-weight: 600;
            color: #fff;
            font-size: 14px;
        }
        .legend-percent {
            font-size: 12px;
            color: #888;
        }
        
        .instruction {
            text-align: center;
            color: #666;
            font-size: 13px;
            margin-top: 20px;
        }
        .current-location {
            color: #5B7BD5;
            font-weight: 600;
        }
        
        /* 销售员表格样式 */
        .sp-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
            font-size: 14px;
        }
        .sp-table th {
            background: rgba(255,255,255,0.05);
            color: #e0e0e0;
            padding: 12px;
            text-align: center;
            font-weight: 600;
            border-bottom: 2px solid rgba(255,255,255,0.1);
        }
        .sp-table th:first-child {
            width: 60px;
        }
        .sp-table td {
            padding: 12px;
            color: #ccc;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            text-align: center;
        }
        .sp-table tbody tr:hover {
            background: rgba(255,255,255,0.05);
        }
        .sp-name {
            font-weight: 600;
            color: #fff;
        }
        
        .breadcrumb {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 15px;
            font-size: 14px;
        }
        .breadcrumb-item {
            color: #888;
            cursor: pointer;
        }
        .breadcrumb-item:hover {
            color: #667eea;
        }
        .breadcrumb-item.active {
            color: #fff;
            font-weight: 600;
            cursor: default;
        }
        .breadcrumb-sep {
            color: #555;
        }
        
        .total-row {
            background: rgba(255,255,255,0.05);
            font-weight: 600;
        }
        .total-row td {
            border-top: 2px solid rgba(255,255,255,0.1);
        }
    </style>
</head>

            ]
        };

        // 饼图颜色 - 参考图片风格
        const colors = [
            '#5B7BD5', '#7ED957', '#F5C842', '#F28C8C', '#87CEEB',
            '#4CAF50', '#FF8C42', '#9B59B6', '#E91E63', '#00BCD4', '#FF5722'
        ];

        let currentView = 'dept';
        let currentDept = null;
        let chart = null;

        // 计算总数和占比
        const total = Object.values(deptData).reduce((a, b) => a + b, 0);
        
        function formatMoney(amount) {
            if (amount >= 1000) {
                return (amount / 1000).toFixed(1) + 'k';
            }
            return amount.toFixed(2);
        }

        function initChart() {
            const ctx = document.getElementById('pieChart').getContext('2d');
            
            const depts = Object.keys(deptData);
            const values = depts.map(d => deptData[d]);
            
            chart = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: depts,
                    datasets: [{
                        data: values,
                        backgroundColor: colors,
                        borderColor: '#1a1d29',
                        borderWidth: 2,
                        hoverOffset: 8
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    cutout: '55%',
                    onClick: (event, elements) => {
                        if (currentView === 'dept' && elements.length > 0) {
                            const index = elements[0].index;
                            const deptName = depts[index];
                            drillDown(deptName);
                        }
                    },
                    plugins: {
                        legend: { display: false },
                        tooltip: {
                            backgroundColor: 'rgba(0,0,0,0.85)',
                            padding: 14,
                            titleFont: { size: 14, weight: 'bold' },
                            bodyFont: { size: 13 },
                            callbacks: {
                                title: function(context) {
                                    return context[0].label;
                                },
                                label: function(context) {
                                    const value = context.raw;
                                    const percent = ((value / total) * 100).toFixed(1);
                                    return [
                                        `Q1业绩: ¥${value.toFixed(2)} 万元`,
                                        `占比: ${percent}%`
                                    ];
                                },
                                afterLabel: function() {
                                    return '点击查看销售员明细 →';
                                }
                            }
                        }
                    }
                },
                plugins: [{
                    id: 'doughnutLabels',
                    afterDraw: function(chart) {
                        if (currentView !== 'dept') return;
                        
                        const ctx = chart.ctx;
                        const centerX = chart.chartArea.left + (chart.chartArea.right - chart.chartArea.left) / 2;
                        const centerY = chart.chartArea.top + (chart.chartArea.bottom - chart.chartArea.top) / 2;
                        const outerRadius = Math.min(chart.chartArea.right - chart.chartArea.left, chart.chartArea.bottom - chart.chartArea.top) / 2 - 10;
                        const labelRadius = outerRadius + 35;
                        
                        chart.data.datasets.forEach(function(dataset, i) {
                            const meta = chart.getDatasetMeta(i);
                            meta.data.forEach(function(element, index) {
                                const label = chart.data.labels[index];
                                const value = dataset.data[index];
                                const percent = ((value / total) * 100).toFixed(1);
                                
                                // 计算扇区中点角度
                                const startAngle = element.startAngle;
                                const endAngle = element.endAngle;
                                const midAngle = (startAngle + endAngle) / 2;
                                
                                // 计算标签位置
                                const labelX = centerX + Math.cos(midAngle) * labelRadius;
                                const labelY = centerY + Math.sin(midAngle) * labelRadius;
                                
                                // 计算引线起点（环形外边缘）
                                const lineStartX = centerX + Math.cos(midAngle) * (outerRadius - 5);
                                const lineStartY = centerY + Math.sin(midAngle) * (outerRadius - 5);
                                
                                // 计算引线拐点
                                const elbowX = centerX + Math.cos(midAngle) * (labelRadius - 15);
                                const elbowY = centerY + Math.sin(midAngle) * (labelRadius - 15);
                                
                                ctx.save();
                                
                                // 绘制引线
                                ctx.strokeStyle = 'rgba(255,255,255,0.5)';
                                ctx.lineWidth = 1;
                                ctx.beginPath();
                                ctx.moveTo(lineStartX, lineStartY);
                                ctx.lineTo(elbowX, elbowY);
                                ctx.lineTo(labelX + (Math.cos(midAngle) > 0 ? -5 : 5), labelY);
                                ctx.stroke();
                                
                                // 绘制标签文字
                                ctx.font = '12px Microsoft YaHei';
                                ctx.fillStyle = '#e0e0e0';
                                ctx.textAlign = Math.cos(midAngle) > 0 ? 'left' : 'right';
                                ctx.textBaseline = 'middle';
                                
                                const textX = labelX + (Math.cos(midAngle) > 0 ? 0 : 0);
                                ctx.fillText(label, textX, labelY - 7);
                                
                                // 绘制百分比
                                ctx.font = 'bold 11px Microsoft YaHei';
                                ctx.fillStyle = colors[index % colors.length];
                                ctx.fillText(`${percent}%`, textX, labelY + 8);
                                
                                ctx.restore();
                            });
                        });
                    }
                }]
            });

            // 渲染图例
            renderLegend();
        }

        function renderLegend() {
            const legendList = document.getElementById('legendList');
            let html = '';
            
            const sortedDepts = Object.entries(deptData).sort((a, b) => b[1] - a[1]);
            
            sortedDepts.forEach(([dept, value], index) => {
                const percent = ((value / total) * 100).toFixed(1);
                html += `
                    <div class="legend-item" onclick="drillDown('${dept}')">
                        <div class="legend-item-left">
                            <div class="legend-color" style="background: ${colors[index]};"></div>
                            <span class="legend-dept">${dept}</span>
                        </div>
                        <div class="legend-right">
                            <div class="legend-value">${value.toFixed(2)}万</div>
                            <div class="legend-percent">${percent}%</div>
                        </div>
                    </div>
                `;
            });
            
            html += `
                <div class="legend-item total-row">
                    <div class="legend-item-left">
                        <span class="legend-dept">合计</span>
                    </div>
                    <div class="legend-right">
                        <div class="legend-value">${total.toFixed(2)}万</div>
                        <div class="legend-percent">100%</div>
                    </div>
                </div>
            `;
            
            legendList.innerHTML = html;
        }

        function drillDown(deptName) {
            currentView = 'salesperson';
            currentDept = deptName;
            
            const spData = deptSalespersonData[deptName] || [];
            const sortedSp = [...spData].sort((a, b) => b.value - a.value);
            const deptTotal = sortedSp.reduce((a, b) => a + b.value, 0);
            
            // 更新饼图
            chart.data.labels = sortedSp.map(s => s.name);
            chart.data.datasets[0].data = sortedSp.map(s => s.value);
            
            // 为销售员生成不同深浅的颜色
            const baseColor = colors[Object.keys(deptData).indexOf(deptName) % colors.length];
            chart.data.datasets[0].backgroundColor = sortedSp.map((_, i) => {
                const alpha = 1 - (i * 0.08);
                return adjustColor(baseColor, alpha);
            });
            
            chart.update();
            
            // 更新标题
            document.getElementById('chartTitle').textContent = `${deptName} - 销售员Q1业绩占比`;
            
            // 显示返回按钮
            document.getElementById('backBtn').classList.add('show');
            
            // 更新面包屑
            document.getElementById('breadcrumb').innerHTML = `
                <span class="breadcrumb-item" onclick="resetToDept()">部门占比</span>
                <span class="breadcrumb-sep">›</span>
                <span class="breadcrumb-item active">${deptName}</span>
            `;
            
            // 隐藏图例，显示销售员表格
            document.getElementById('pieLegend').style.display = 'none';
            document.getElementById('spTableContainer').style.display = 'block';
            
            // 渲染销售员表格
            const spBody = document.getElementById('spTableBody');
            let spHtml = '';
            sortedSp.forEach((sp, index) => {
                const rank = index + 1;
                const percent = ((sp.value / deptTotal) * 100).toFixed(1);
                spHtml += `
                    <tr>
                        <td><strong>${rank}</strong></td>
                        <td><span class="sp-name">${sp.name}</span></td>
                        <td>¥${sp.value.toFixed(2)}万</td>
                        <td>${percent}%</td>
                    </tr>
                `;
            });
            spHtml += `
                <tr class="total-row">
                    <td>-</td>
                    <td>合计</td>
                    <td>¥${deptTotal.toFixed(2)}万</td>
                    <td>100%</td>
                </tr>
            `;
            spBody.innerHTML = spHtml;
            
            // 更新提示
            document.getElementById('instruction').innerHTML = `📍 当前查看: <span class="current-location">${deptName}</span> | 销售员数: ${sortedSp.length} | Q1业绩: ¥${deptTotal.toFixed(2)}万元`;
        }

        function resetToDept() {
            currentView = 'dept';
            currentDept = null;
            
            const depts = Object.keys(deptData);
            const values = depts.map(d => deptData[d]);
            
            // 恢复部门饼图
            chart.data.labels = depts;
            chart.data.datasets[0].data = values;
            chart.data.datasets[0].backgroundColor = colors;
            chart.update();
            
            // 更新标题
            document.getElementById('chartTitle').textContent = '各部门Q1业绩占比';
            
            // 隐藏返回按钮
            document.getElementById('backBtn').classList.remove('show');
            
            // 重置面包屑
            document.getElementById('breadcrumb').innerHTML = `
                <span class="breadcrumb-item active">部门维度</span>
            `;
            
            // 显示图例，隐藏销售员表格
            document.getElementById('pieLegend').style.display = 'block';
            document.getElementById('spTableContainer').style.display = 'none';
            
            document.getElementById('instruction').textContent = '💡 点击饼图或右侧部门名称查看销售员明细';
        }
        
        // 调整颜色透明度
        function adjustColor(hex, alpha) {
            const r = parseInt(hex.slice(1, 3), 16);
            const g = parseInt(hex.slice(3, 5), 16);
            const b = parseInt(hex.slice(5, 7), 16);
            return `rgba(${r}, ${g}, ${b}, ${alpha})`;
        }

        // 初始化
        window.onload = function() {
            initChart();
        };
    </script>
</body>
</html>
