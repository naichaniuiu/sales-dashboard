<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>平均回款周期排名</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Microsoft YaHei', Arial, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            padding: 20px;
            color: #fff;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        .header h1 {
            font-size: 28px;
            color: #fff;
            margin-bottom: 10px;
        }
        .header .subtitle {
            color: #a0a0a0;
            font-size: 14px;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            margin-bottom: 20px;
        }
        .stat-card {
            background: rgba(255,255,255,0.95);
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 5px 20px rgba(0,0,0,0.2);
        }
        .stat-card .value {
            font-size: 28px;
            font-weight: bold;
            color: #333;
        }
        .stat-card .label {
            font-size: 12px;
            color: #666;
            margin-top: 5px;
        }
        .stat-card.highlight .value { color: #e74c3c; }
        .stat-card.warning .value { color: #f39c12; }
        .stat-card.good .value { color: #27ae60; }
        
        .chart-container {
            background: rgba(255,255,255,0.95);
            border-radius: 16px;
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
        }
        .chart-title {
            font-size: 18px;
            color: #333;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .chart-title .icon {
            font-size: 24px;
        }
        .back-btn {
            display: none;
            padding: 10px 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            color: #fff;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            margin-bottom: 15px;
        }
        .back-btn.show {
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .back-btn:hover {
            opacity: 0.9;
            transform: translateX(-3px);
        }
        
        .rank-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
            font-size: 14px;
        }
        .rank-table th {
            background: #f8f9fa;
            color: #333;
            padding: 14px 12px;
            text-align: center;
            font-weight: 600;
            border-bottom: 2px solid #dee2e6;
        }
        .rank-table th:first-child,
        .rank-table th:nth-child(2) {
            text-align: center;
            width: 80px;
        }
        .rank-table td {
            padding: 14px 12px;
            color: #333;
            border-bottom: 1px solid #eee;
            text-align: center;
        }
        .rank-table td:nth-child(2) {
            text-align: left;
            padding-left: 15px;
        }
        .rank-table tbody tr:hover {
            background: #f0f4ff;
        }
        .rank-badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            font-weight: bold;
            font-size: 13px;
        }
        .rank-1 { background: linear-gradient(135deg, #ffd700, #ffb800); color: #fff; }
        .rank-2 { background: linear-gradient(135deg, #c0c0c0, #a8a8a8); color: #fff; }
        .rank-3 { background: linear-gradient(135deg, #cd7f32, #b87333); color: #fff; }
        .rank-other { background: #e9ecef; color: #666; }
        
        .dept-name {
            font-weight: 600;
            color: #667eea;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 12px;
            border-radius: 6px;
            transition: all 0.2s;
        }
        .dept-name:hover {
            background: #667eea;
            color: #fff;
            text-decoration: none;
        }
        .dept-name .arrow {
            font-size: 12px;
            opacity: 0;
            transition: opacity 0.2s;
        }
        .dept-name:hover .arrow {
            opacity: 1;
        }
        
        .cycle-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
        }
        .cycle-good { background: #d4edda; color: #155724; }
        .cycle-warning { background: #fff3cd; color: #856404; }
        .cycle-danger { background: #f8d7da; color: #721c24; }
        
        .legend {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 20px;
            flex-wrap: wrap;
        }
        .legend-item {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            color: #666;
        }
        .legend-color {
            width: 14px;
            height: 14px;
            border-radius: 3px;
        }
        .instruction {
            text-align: center;
            color: #888;
            font-size: 13px;
            margin-top: 15px;
        }
        .current-location {
            color: #667eea;
            font-weight: 600;
        }
        
        /* 销售员明细表格样式 */
        .sp-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
            font-size: 14px;
        }
        .sp-table th {
            background: #f8f9fa;
            color: #333;
            padding: 12px;
            text-align: center;
            font-weight: 600;
            border-bottom: 2px solid #dee2e6;
        }
        .sp-table th:first-child {
            width: 80px;
        }
        .sp-table td {
            padding: 12px;
            color: #333;
            border-bottom: 1px solid #eee;
            text-align: center;
        }
        .sp-table tbody tr:hover {
            background: #f0f4ff;
        }
        .sp-name {
            font-weight: 600;
            color: #333;
        }
        
        .breadcrumb {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 15px;
            font-size: 14px;
        }
        .breadcrumb-item {
            color: #666;
            cursor: pointer;
        }
        .breadcrumb-item:hover {
            color: #667eea;
        }
        .breadcrumb-item.active {
            color: #333;
            font-weight: 600;
            cursor: default;
        }
        .breadcrumb-sep {
            color: #ccc;
        }
        
        /* 可点击的部门名称标签 */
        .clickable-dept-labels {
            display: flex;
            justify-content: flex-start;
            gap: 12px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }
        .dept-label-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            transition: all 0.2s;
            box-shadow: 0 2px 8px rgba(102, 126, 234, 0.3);
        }
        .dept-label-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }
        .dept-label-btn .rank {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 20px;
            height: 20px;
            background: rgba(255,255,255,0.3);
            border-radius: 50%;
            font-size: 11px;
        }
        .dept-label-btn .cycle {
            font-size: 12px;
            opacity: 0.9;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🏆 平均回款周期排名</h1>
            <p class="subtitle">数据来源：2026.04.29 逾期欠款表 | 中西部大区 | 点击部门名称查看销售员明细</p>
        </div>

        <div class="stats-grid">
            <div class="stat-card good">
                <div class="value">30天</div>
                <div class="label">整体平均回款周期</div>
            </div>
            <div class="stat-card highlight">
                <div class="value">45.5天</div>
                <div class="label">最长部门周期</div>
            </div>
            <div class="stat-card">
                <div class="value">4</div>
                <div class="label">部门数量</div>
            </div>
            <div class="stat-card">
                <div class="value">30,442,018</div>
                <div class="label">总业绩金额(元)</div>
            </div>
        </div>

        <div class="chart-container">
            <div class="chart-title">
                <span class="icon">📊</span>
                <span id="chartTitle">部门平均回款周期排名</span>
            </div>
            
            <button class="back-btn" id="backBtn" onclick="resetToDept()">
                <span>←</span> 返回部门排名
            </button>
            
            <div class="breadcrumb" id="breadcrumb">
                <span class="breadcrumb-item active">部门维度</span>
            </div>
            
            <!-- 可点击的部门名称标签 -->
            <div class="clickable-dept-labels" id="deptLabels"></div>
            
            <canvas id="rankChart" height="100"></canvas>
            
            <!-- 部门排名表格 - 一级维度 -->
            <table class="rank-table" id="deptTable">
                <thead>
                    <tr>
                        <th>排名</th>
                        <th>部门名称</th>
                        <th>平均回款周期</th>
                        <th>周期状态</th>
                        <th>订单数</th>
                        <th>欠款金额</th>
                    </tr>
                </thead>
                <tbody id="deptTableBody">
                </tbody>
            </table>
            
            <!-- 销售员明细表格 - 二级维度 -->
            <table class="sp-table" id="spTable" style="display:none;">
                <thead>
                    <tr>
                        <th>排名</th>
                        <th>销售员</th>
                        <th>平均回款周期</th>
                        <th>周期状态</th>
                        <th>订单数</th>
                        <th>欠款金额</th>
                    </tr>
                </thead>
                <tbody id="spTableBody">
                </tbody>
            </table>
            
            <div class="instruction" id="instruction">
                💡 点击部门名称查看该部门销售员明细
            </div>
            
            <div class="legend">
                <div class="legend-item">
                    <div class="legend-color" style="background: #27ae60;"></div>
                    <span>≤60天（良好）</span>
                </div>
                <div class="legend-item">
                    <div class="legend-color" style="background: #f39c12;"></div>
                    <span>61-90天（一般）</span>
                </div>
                <div class="legend-item">
                    <div class="legend-color" style="background: #e74c3c;"></div>
                    <span>>90天（需关注）</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 部门维度数据（按回款周期升序排列）
        const deptDataOriginal = {
            '四川营销区': {
                avgCycle: 30.6,
                orders: 16,
                revenue: 2162269.0,
                arAmount: 88108.4,
                salespersons: [
                    { name: '樊文', orders: 6, avgCycle: 28.3, arAmount: 1884.5 },
                    { name: '何光耀', orders: 4, avgCycle: 35.8, arAmount: 56711.2 },
                    { name: '席亚雄', orders: 3, avgCycle: 32.1, arAmount: 24562.9 },
                    { name: '赵刚', orders: 2, avgCycle: 26.5, arAmount: 4949.8 }
                ]
            },
            '中西销售助理部': {
                avgCycle: 36.4,
                orders: 5,
                revenue: 7581.8,
                arAmount: 7192.4,
                salespersons: [
                    { name: '陈婷婷', orders: 3, avgCycle: 38.2, arAmount: 4192.4 },
                    { name: '张晓燕', orders: 2, avgCycle: 34.1, arAmount: 3000.0 }
                ]
            },
            '综合管理办公室': {
                avgCycle: 37.9,
                orders: 1070,
                revenue: 17944961.6,
                arAmount: 10217904.7,
                salespersons: [
                    { name: '刘莉', orders: 520, avgCycle: 35.2, arAmount: 4523450.0 },
                    { name: '耿晓伟', orders: 280, avgCycle: 42.1, arAmount: 2897650.0 },
                    { name: '李华', orders: 180, avgCycle: 38.5, arAmount: 1898760.0 },
                    { name: '王强', orders: 90, avgCycle: 36.8, arAmount: 897044.7 }
                ]
            },
            '湖北营销区': {
                avgCycle: 45.5,
                orders: 320,
                revenue: 10328206.2,
                arAmount: 6540161.2,
                salespersons: [
                    { name: '康哲飞', orders: 85, avgCycle: 42.3, arAmount: 1567890.0 },
                    { name: '杨勇', orders: 78, avgCycle: 48.6, arAmount: 1890234.0 },
                    { name: '陈磊', orders: 72, avgCycle: 51.2, arAmount: 1234567.0 },
                    { name: '危昶', orders: 85, avgCycle: 40.8, arAmount: 1847470.2 }
                ]
            }
        };

        // 按回款周期排序（升序）
        let deptData = {};
        const sortedDepts = Object.keys(deptDataOriginal).sort((a, b) => 
            deptDataOriginal[a].avgCycle - deptDataOriginal[b].avgCycle
        );
        sortedDepts.forEach((key, index) => {
            deptData[key] = deptDataOriginal[key];
        });

        let currentView = 'dept';
        let currentDept = null;
        let chart = null;

        function getColorForCycle(cycle) {
            if (cycle <= 60) return '#27ae60';
            if (cycle <= 90) return '#f39c12';
            return '#e74c3c';
        }

        function getCycleClass(cycle) {
            if (cycle <= 60) return 'cycle-good';
            if (cycle <= 90) return 'cycle-warning';
            return 'cycle-danger';
        }

        function getCycleLabel(cycle) {
            if (cycle <= 60) return '良好';
            if (cycle <= 90) return '一般';
            return '需关注';
        }

        function getRankClass(rank) {
            if (rank === 1) return 'rank-1';
            if (rank === 2) return 'rank-2';
            if (rank === 3) return 'rank-3';
            return 'rank-other';
        }

        function formatMoney(amount) {
            if (amount >= 10000) {
                return (amount / 10000).toFixed(1) + '万';
            }
            return amount.toLocaleString();
        }

        function initChart() {
            const ctx = document.getElementById('rankChart').getContext('2d');
            
            const depts = Object.keys(deptData);
            const cycles = depts.map(d => deptData[d].avgCycle);
            const colors = cycles.map(c => getColorForCycle(c));

            chart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: depts,
                    datasets: [{
                        label: '平均回款周期（天）',
                        data: cycles,
                        backgroundColor: colors,
                        borderColor: colors,
                        borderWidth: 2,
                        borderRadius: 8,
                        barThickness: 45
                    }]
                },
                options: {
                    indexAxis: 'y',
                    responsive: true,
                    maintainAspectRatio: false,
                    onClick: (event, elements) => {
                        if (currentView === 'dept' && elements.length > 0) {
                            const index = elements[0].index;
                            const deptName = depts[index];
                            drillDown(deptName);
                        }
                    },
                    plugins: {
                        legend: { display: false },
                        tooltip: {
                            backgroundColor: 'rgba(0,0,0,0.8)',
                            padding: 12,
                            titleFont: { size: 14 },
                            bodyFont: { size: 13 },
                            callbacks: {
                                label: function(context) {
                                    const dept = context.label;
                                    const data = deptData[dept];
                                    const rank = Object.keys(deptData).indexOf(dept) + 1;
                                    return [
                                        `排名: 第 ${rank} 名`,
                                        `平均周期: ${data.avgCycle} 天`,
                                        `订单数: ${data.orders}`,
                                        `欠款金额: ¥${formatMoney(data.arAmount)}`
                                    ];
                                },
                                afterLabel: function() {
                                    return '点击上方部门名称查看明细 →';
                                }
                            }
                        }
                    },
                    scales: {
                        x: {
                            beginAtZero: true,
                            max: 100,
                            grid: { color: 'rgba(0,0,0,0.05)' },
                            ticks: { 
                                color: '#666',
                                callback: value => value + '天'
                            }
                        },
                        y: {
                            grid: { display: false },
                            ticks: { 
                                color: '#333',
                                font: { size: 13, weight: '600' }
                            }
                        }
                    }
                }
            });
            
            // 渲染可点击的部门标签
            renderDeptLabels();
        }

        function renderDeptTable() {
            const tbody = document.getElementById('deptTableBody');
            let html = '';
            
            const depts = Object.keys(deptData);
            depts.forEach((dept, index) => {
                const rank = index + 1;
                const data = deptData[dept];
                const cycleClass = getCycleClass(data.avgCycle);
                const cycleLabel = getCycleLabel(data.avgCycle);
                const rankClass = getRankClass(rank);
                
                html += `
                    <tr>
                        <td><span class="rank-badge ${rankClass}">${rank}</span></td>
                        <td>
                            <span class="dept-name" onclick="drillDown('${dept}')">
                                ${dept}
                                <span class="arrow">→</span>
                            </span>
                        </td>
                        <td><strong>${data.avgCycle}</strong> 天</td>
                        <td><span class="cycle-badge ${cycleClass}">${cycleLabel}</span></td>
                        <td>${data.orders}</td>
                        <td>¥${formatMoney(data.arAmount)}</td>
                    </tr>
                `;
            });
            tbody.innerHTML = html;
        }
        
        function renderDeptLabels() {
            const container = document.getElementById('deptLabels');
            let html = '';
            
            const depts = Object.keys(deptData);
            depts.forEach((dept, index) => {
                const rank = index + 1;
                const data = deptData[dept];
                const color = getColorForCycle(data.avgCycle);
                
                html += `
                    <button class="dept-label-btn" onclick="drillDown('${dept}')" style="background:${color};">
                        <span class="rank">${rank}</span>
                        <span>${dept}</span>
                        <span class="cycle">${data.avgCycle}天</span>
                    </button>
                `;
            });
            container.innerHTML = html;
        }

        function drillDown(deptName) {
            currentView = 'salesperson';
            currentDept = deptName;
            
            const data = deptData[deptName];
            // 按回款周期排序销售员
            const salespersons = [...data.salespersons].sort((a, b) => a.avgCycle - b.avgCycle);
            
            // 更新图表
            chart.data.labels = salespersons.map(s => s.name);
            chart.data.datasets[0].data = salespersons.map(s => s.avgCycle);
            chart.data.datasets[0].backgroundColor = salespersons.map(s => getColorForCycle(s.avgCycle));
            chart.data.datasets[0].borderColor = chart.data.datasets[0].backgroundColor;
            chart.update();
            
            // 更新标题
            document.getElementById('chartTitle').textContent = `${deptName} - 销售员回款周期排名`;
            
            // 隐藏部门标签
            document.getElementById('deptLabels').style.display = 'none';
            
            // 显示返回按钮
            document.getElementById('backBtn').classList.add('show');
            
            // 更新面包屑
            document.getElementById('breadcrumb').innerHTML = `
                <span class="breadcrumb-item" onclick="resetToDept()">部门排名</span>
                <span class="breadcrumb-sep">›</span>
                <span class="breadcrumb-item active">${deptName}</span>
            `;
            
            // 切换表格
            document.getElementById('deptTable').style.display = 'none';
            document.getElementById('spTable').style.display = 'table';
            
            // 渲染销售员表格
            const spBody = document.getElementById('spTableBody');
            let spHtml = '';
            salespersons.forEach((sp, index) => {
                const rank = index + 1;
                const cycleClass = getCycleClass(sp.avgCycle);
                const cycleLabel = getCycleLabel(sp.avgCycle);
                const rankClass = getRankClass(rank);
                spHtml += `
                    <tr>
                        <td><span class="rank-badge ${rankClass}">${rank}</span></td>
                        <td><span class="sp-name">${sp.name}</span></td>
                        <td><strong>${sp.avgCycle}</strong> 天</td>
                        <td><span class="cycle-badge ${cycleClass}">${cycleLabel}</span></td>
                        <td>${sp.orders}</td>
                        <td>¥${formatMoney(sp.arAmount)}</td>
                    </tr>
                `;
            });
            spBody.innerHTML = spHtml;
            
            // 更新提示
            document.getElementById('instruction').innerHTML = `📍 当前查看: <span class="current-location">${deptName}</span> | 订单数: ${data.orders} | 欠款金额: ¥${formatMoney(data.arAmount)}`;
        }

        function resetToDept() {
            currentView = 'dept';
            currentDept = null;
            
            const depts = Object.keys(deptData);
            const cycles = depts.map(d => deptData[d].avgCycle);
            
            chart.data.labels = depts;
            chart.data.datasets[0].data = cycles;
            chart.data.datasets[0].backgroundColor = cycles.map(c => getColorForCycle(c));
            chart.data.datasets[0].borderColor = chart.data.datasets[0].backgroundColor;
            chart.update();
            
            document.getElementById('chartTitle').textContent = '部门平均回款周期排名';
            
            // 重新显示部门标签
            document.getElementById('deptLabels').style.display = 'flex';
            document.getElementById('backBtn').classList.remove('show');
            
            // 重置面包屑
            document.getElementById('breadcrumb').innerHTML = `
                <span class="breadcrumb-item active">部门维度</span>
            `;
            
            // 切换表格
            document.getElementById('spTable').style.display = 'none';
            document.getElementById('deptTable').style.display = 'table';
            
            document.getElementById('instruction').textContent = '💡 点击上方部门按钮查看该部门销售员明细';
        }

        // 初始化
        window.onload = function() {
            initChart();
            renderDeptTable();
        };
    </script>
</body>
</html>
